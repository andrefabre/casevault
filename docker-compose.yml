version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: digital-legacy-db
    environment:
      POSTGRES_DB: digital_legacy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secure_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - digital-legacy-network

  # Redis for Session Storage (Optional)
  redis:
    image: redis:7-alpine
    container_name: digital-legacy-redis
    command: redis-server --requirepass secure_redis_password_change_me
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - digital-legacy-network

  # Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digital-legacy-app
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:secure_password_change_me@postgres:5432/digital_legacy
      - NEXTAUTH_URL=https://mydigitallegacyvault.com
      - REDIS_URL=redis://:secure_redis_password_change_me@redis:6379
    env_file:
      - .env.production
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - digital-legacy-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: digital-legacy-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - digital-legacy-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  digital-legacy-network:
    driver: bridge